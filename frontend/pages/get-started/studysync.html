<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/dashboard.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/ui-enhancements.css">
    <link rel="stylesheet" href="../../assets/css/transitions.css">
    <title>StudySync - StudyClub</title>
</head>

<body>
    <div class="dashboard-layout">
        <!-- Shared sidebar loaded by loadSidebar.js -->
        <div id="sidebar-container" data-sidebar-path="../components/sidebar.html"></div>
        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search materials, notes, or ask AI...">
                </div>
            </div>
            <div class="topbar-right">
                <a href="../settings.html"><button class="topbar-icon-btn">
                        <i class="fas fa-cog"></i>
                    </button></a>
                <div class="topbar-user" onclick="ModalManager.open('userModal')">
                    <div class="topbar-user-avatar">SS</div>
                    <div class="topbar-user-info">
                        <div class="topbar-user-name">Srujan Sattwik</div>
                        <div class="topbar-user-role">Student</div>
                    </div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="content-container">
                <section class="page-header" style="text-align: center; padding: 40px 0;">
                    <div class="container">
                        <h1 class="page-title">StudySync</h1>
                        <p class="page-subtitle">Real-time group study planner - Coming Soon</p>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div class="sidebar-overlay"></div>
    <script src="../../assets/js/profile-updater.js"></script>
    <script src="../src/js/loadSidebar.js"></script>
    <script src="../src/js/layout.js"></script>
    <script src="../../assets/js/page-transitions.js"></script>
</body>

</html>
