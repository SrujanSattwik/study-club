<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowNook | AI Study Assistant</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="src/css/dashboard.css">
    <link rel="stylesheet" href="src/css/layout.css">
    <link rel="stylesheet" href="../assets/css/knownook.css">
    <link rel="stylesheet" href="../assets/css/ui-enhancements.css">
</head>
<body>
    <div class="dashboard-layout">
        <div id="sidebar-container"></div>

        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle"><i class="fas fa-bars"></i></button>
            </div>
            <div class="topbar-right">
                <a href="login.html" class="btn btn-primary btn-sm login-btn">Login</a>
            </div>
        </header>

        <main class="main-content kn-main">
            <div class="kn-layout">

                <!-- ── Session Sidebar ── -->
                <aside class="kn-session-sidebar">
                    <div class="kn-sidebar-header">
                        <span class="kn-sidebar-title"><i class="fas fa-robot"></i> KnowNook</span>
                        <button id="new-chat-btn" class="btn-new-chat" title="New Chat">
                            <i class="fas fa-plus"></i> New Chat
                        </button>
                    </div>
                    <div class="kn-session-list" id="session-list">
                        <!-- sessions rendered here -->
                        <div class="kn-session-empty" id="session-empty">
                            <i class="fas fa-comment-dots"></i>
                            <p>No chats yet.<br>Click <strong>New Chat</strong> to start.</p>
                        </div>
                    </div>
                </aside>

                <!-- ── Main Chat Area ── -->
                <div class="kn-chat-area">
                    <!-- Chat Header -->
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <div class="chat-header-avatar"><i class="fas fa-robot"></i></div>
                            <div>
                                <h3 id="chat-title">KnowNook AI</h3>
                                <div class="chat-header-sub">
                                    <span class="status-dot"></span>
                                    <span>Powered by NVIDIA GPT-OSS 20B</span>
                                </div>
                            </div>
                        </div>
                        <div class="chat-header-actions">
                            <button id="delete-session-btn" class="btn-delete-session" title="Delete this chat" style="display:none">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Messages -->
                    <div class="chat-box" id="chat-box">
                        <div class="kn-welcome">
                            <div class="kn-welcome-icon"><i class="fas fa-robot"></i></div>
                            <h2>Welcome to KnowNook AI</h2>
                            <p>Your AI-powered study assistant. Click <strong>New Chat</strong> to begin or select a previous conversation.</p>
                        </div>
                    </div>

                    <!-- Input -->
                    <div class="chat-input-container" id="chat-input-container">
                        <form id="chat-form" class="chat-form">
                            <textarea id="chat-input" placeholder="Type your question here…" rows="1"></textarea>
                            <button type="submit" id="send-btn" class="send-btn" title="Send">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </form>
                        <p class="kn-input-hint" id="input-hint">Select or create a chat to start messaging.</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/auth-manager.js"></script>
    <script src="js/knownook-chat.js"></script>
    <script src="../assets/js/script.js"></script>
    <script src="src/js/loadSidebar.js"></script>
    <script src="src/js/layout.js"></script>
</body>
</html>
